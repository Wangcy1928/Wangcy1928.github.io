---
layout: false
---
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wcy 的博客</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
    }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: url(/images/bg.jpg) center/cover no-repeat;
        font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        color: #fff;
        text-align: center;
        position: relative;
        margin: 0;
        padding: 0;
    }
    body::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 0;
    }
    .hero {
        position: relative;
        z-index: 1;
        max-width: 100vw;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0 auto;
    }
    .hero h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 700;
        margin: 0;
        letter-spacing: 4px;
        text-align: center;
        width: 100%;
    }
    .hero p {
        font-size: clamp(1rem, 2.5vw, 1.5rem);
        opacity: 0.9;
        margin-top: 12px;
        text-align: center;
        width: 100%;
    }
    .hero a {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 36px;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border-radius: 30px;
        text-decoration: none;
        font-size: clamp(0.85rem, 1.5vw, 1.1rem);
        border: 1px solid rgba(255, 255, 255, 0.25);
        transition: background 0.3s;
        white-space: nowrap;
        text-align: center;
    }
    .hero a:hover {
        background: rgba(255, 255, 255, 0.35);
    }
    @media (max-width: 480px) {
        .hero h1 {
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        .hero p {
            font-size: 0.9rem;
        }
        .hero a {
            padding: 10px 24px;
            font-size: 0.85rem;
        }
    }
</style>
</head>
<body>
    <div class="hero">
        <h1>欢迎来到 Wcy 的博客</h1>
        <p>玉汝于成，功不唐捐</p>
        <a href="/archives/">进入博客</a>
    </div>
</body>
</html>
